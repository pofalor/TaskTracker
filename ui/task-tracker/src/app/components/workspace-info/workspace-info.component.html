<div class="container-fluid">
    <div class="row">
        <div class="col-12 col-sm">
            <div class="text-left text-uppercase f-30 f-w-700 my-3">
                {{"Projects" | lang}}
            </div>
        </div>
    </div>
    <div class="row">
        <ng-container *ngFor="let project of allProjects">
            <div *ngIf="!!allProjects && allProjects.length > 0" class="col-auto col-xxl-3 mb-4">
                <div class="card h-100 mb-0">
                    <div class="card-body pb-0 pr-0">
                        <div class="row">
                            <div class="col-auto d-flex flex-column">
                                <div class="text-left text-uppercase f-22 f-w-700">
                                    {{project.name}}
                                </div>
                            </div>
                            <div class="col-auto d-flex flex-column">
                                <div class="text-left text-uppercase f-22 f-w-700">
                                    {{project.description}}
                                </div>
                            </div>
                            <!-- <div class="col" *ngIf="project.teamRole == UserTeamRole.Owner">
                                <button (click)="editWorkSpace(project)" class="btn btn-outline-primary pull-right"
                                    style="float: right;">
                                    <i class="fa fa-edit" style="font-size: 17px; "></i>
                                    {{'buttons.change'| lang}}
                                </button>
                            </div> -->
                            <div class="col-12 pb-3">
                                <button class="btn btn-primary">
                                    {{'buttons.view' | lang}}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </ng-container>

        <div class="col-auto mb-4" *ngIf="isWorkspaceOwner">
            <div class="card h-100 mb-0" style="min-width: 200px; min-height: 200px;">
                <div class="card-body h-100 pb-0 pr-0">
                    <div class="row h-100">
                        <div class="col d-flex flex-column flex-center">
                            <img style="width: 60px;" src="/assets/icons/plus_icon.png" type="button"
                                class="cursor-pointer" (click)="createProject()" draggable="false" class="mb-2">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12 col-sm">
            <div class="text-left text-uppercase f-30 f-w-700 my-3">
                {{"Invitations created by me in this workspace" | lang}}
            </div>
        </div>
    </div>

    <div class="row">
        <ng-container *ngFor="let invitation of invitesMeCreated">
            <div class="col-auto col-xxl-3 mb-4" *ngIf="!!invitesMeCreated && invitesMeCreated.length > 0">
                <div class="card h-100 mb-0">
                    <div class="card-body pb-0 pr-0">
                        <div class="row">
                            <div class="col-auto d-flex flex-column">
                                <div class="text-left text-uppercase f-22 f-w-700">
                                    {{invitation.date}}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </ng-container>
        <div class="col-auto mb-4" *ngIf="isWorkspaceOwner">
            <div class="card h-100 mb-0" style="min-width: 200px; min-height: 200px;">
                <div class="card-body h-100 pb-0 pr-0">
                    <div class="row h-100">
                        <div class="col d-flex flex-column flex-center">
                            <img style="width: 60px;" src="/assets/icons/plus_icon.png" type="button"
                                class="cursor-pointer" (click)="createInvite()" draggable="false" class="mb-2">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
